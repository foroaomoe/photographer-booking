<style>

/* ==========================================================
   FOROAOMOE PHOTOGRAPHER CRM
   Version 1.0
========================================================== */


/* ==========================================================
   ROOT
========================================================== */

:root{

    --primary:#2563EB;
    --primary-hover:#1D4ED8;

    --success:#22C55E;
    --warning:#F59E0B;
    --danger:#EF4444;

    --sidebar:#111827;

    --bg:#F8FAFC;

    --card:#FFFFFF;

    --text:#1F2937;
    --text-light:#6B7280;

    --border:#E5E7EB;

    --radius:16px;

    --shadow:
        0 10px 30px rgba(0,0,0,.08);

    --transition:.25s;

}


/* ==========================================================
   RESET
========================================================== */

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

html{

    scroll-behavior:smooth;

}

body{

    background:var(--bg);

    color:var(--text);

    font-family:
        "Segoe UI",
        sans-serif;

    font-size:15px;

}


/* ==========================================================
   TYPOGRAPHY
========================================================== */

h1{

    font-size:32px;
    font-weight:700;

}

h2{

    font-size:26px;
    font-weight:700;

}

h3{

    font-size:20px;
    font-weight:600;

}

p{

    color:var(--text-light);

}


/* ==========================================================
   LAYOUT
========================================================== */

.wrapper{

    display:flex;

    min-height:100vh;

}

.content{

    flex:1;

    padding:40px;

    overflow:auto;

}


/* ==========================================================
   PAGE
========================================================== */

.page{

    display:block;

}

.hidden{

    display:none !important;

}


/* ==========================================================
   FLEX
========================================================== */

.flex{

    display:flex;

}

.flex-between{

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.flex-center{

    display:flex;

    justify-content:center;

    align-items:center;

}


/* ==========================================================
   SPACING
========================================================== */

.mt-10{margin-top:10px;}
.mt-20{margin-top:20px;}
.mt-30{margin-top:30px;}
.mt-40{margin-top:40px;}

.mb-10{margin-bottom:10px;}
.mb-20{margin-bottom:20px;}
.mb-30{margin-bottom:30px;}

.text-center{

    text-align:center;

}

.w-100{

    width:100%;

}
/* ==========================================================
   SIDEBAR
========================================================== */

.sidebar{

    width:260px;

    min-height:100vh;

    background:var(--sidebar);

    color:#fff;

    display:flex;

    flex-direction:column;

    position:sticky;

    top:0;

    left:0;

    box-shadow:var(--shadow);

    z-index:100;

}


/* ==========================================================
   LOGO
========================================================== */

.logo{

    padding:32px 24px;

    border-bottom:1px solid rgba(255,255,255,.08);

}

.logo h2{

    color:#fff;

    font-size:22px;

    font-weight:700;

    letter-spacing:1px;

}

.logo p{

    color:rgba(255,255,255,.65);

    margin-top:6px;

    font-size:13px;

}


/* ==========================================================
   MENU
========================================================== */

.menu{

    flex:1;

    padding:20px 0;

}

.menu-title{

    padding:0 24px 12px;

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:1px;

    color:rgba(255,255,255,.45);

}

.menu ul{

    list-style:none;

}

.menu li{

    margin:6px 14px;

}

.menu a{

    display:flex;

    align-items:center;

    gap:12px;

    padding:13px 16px;

    color:rgba(255,255,255,.78);

    text-decoration:none;

    border-radius:12px;

    transition:all var(--transition);

    font-weight:500;

}

.menu a i{

    font-size:18px;

    width:22px;

    text-align:center;

}

.menu a:hover{

    background:rgba(255,255,255,.08);

    color:#fff;

    transform:translateX(4px);

}

.menu a.active{

    background:var(--primary);

    color:#fff;

    box-shadow:0 10px 20px rgba(37,99,235,.35);

}


/* ==========================================================
   SIDEBAR FOOTER
========================================================== */

.sidebar-footer{

    padding:20px 24px;

    border-top:1px solid rgba(255,255,255,.08);

    font-size:13px;

    color:rgba(255,255,255,.6);

}

.sidebar-footer strong{

    display:block;

    color:#fff;

    margin-bottom:4px;

}


/* ==========================================================
   PAGE HEADER
========================================================== */

.page-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

}

.page-title{

    font-size:30px;

    font-weight:700;

    color:var(--text);

}

.page-subtitle{

    margin-top:6px;

    color:var(--text-light);

    font-size:14px;

}


/* ==========================================================
   ACTION BAR
========================================================== */

.action-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:15px;

    margin-bottom:20px;

    flex-wrap:wrap;

}
/* ==========================================================
   CARD
========================================================== */

.card{

    background:var(--card);

    border-radius:var(--radius);

    padding:24px;

    box-shadow:var(--shadow);

    border:1px solid var(--border);

    margin-bottom:24px;

}

.card-title{

    font-size:18px;

    font-weight:700;

    margin-bottom:20px;

    color:var(--text);

}

/* ==========================================================
   DASHBOARD GRID
========================================================== */

.dashboard-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:20px;

    margin-bottom:30px;

}

.stat-card{

    background:#fff;

    border-radius:var(--radius);

    padding:24px;

    border:1px solid var(--border);

    box-shadow:var(--shadow);

    transition:.25s;

}

.stat-card:hover{

    transform:translateY(-4px);

}

.stat-title{

    color:var(--text-light);

    font-size:14px;

    margin-bottom:12px;

}

.stat-value{

    font-size:34px;

    font-weight:700;

    color:var(--primary);

}

.stat-footer{

    margin-top:10px;

    font-size:13px;

    color:var(--text-light);

}

/* ==========================================================
   BUTTON
========================================================== */

.btn{

    border:none;

    cursor:pointer;

    border-radius:12px;

    padding:12px 22px;

    font-size:14px;

    font-weight:600;

    transition:.25s;

    display:inline-flex;

    align-items:center;

    gap:8px;

    text-decoration:none;

}

.btn:hover{

    transform:translateY(-2px);

}

.btn-primary{

    background:var(--primary);

    color:#fff;

}

.btn-primary:hover{

    background:var(--primary-hover);

}

.btn-success{

    background:var(--success);

    color:#fff;

}

.btn-danger{

    background:var(--danger);

    color:#fff;

}

.btn-light{

    background:#fff;

    border:1px solid var(--border);

    color:var(--text);

}

/* ==========================================================
   FORM
========================================================== */

.form-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:20px;

}

.form-group{

    display:flex;

    flex-direction:column;

}

.form-group.full{

    grid-column:1/-1;

}

.form-group label{

    margin-bottom:8px;

    font-size:14px;

    font-weight:600;

    color:var(--text);

}

.form-control{

    width:100%;

    padding:12px 14px;

    border:1px solid var(--border);

    border-radius:12px;

    font-size:14px;

    transition:.25s;

    background:#fff;

}

.form-control:focus{

    outline:none;

    border-color:var(--primary);

    box-shadow:0 0 0 3px rgba(37,99,235,.15);

}

textarea.form-control{

    min-height:120px;

    resize:vertical;

}

/* ==========================================================
   SEARCH
========================================================== */

.search-box{

    position:relative;

}

.search-box input{

    padding-left:40px;

}

.search-box i{

    position:absolute;

    left:14px;

    top:50%;

    transform:translateY(-50%);

    color:var(--text-light);

}
/* ==========================================================
   TABLE
========================================================== */

.table-wrapper{

    width:100%;

    overflow-x:auto;

}

.table{

    width:100%;

    border-collapse:collapse;

    background:#fff;

}

.table th{

    background:#F9FAFB;

    color:var(--text);

    font-size:14px;

    font-weight:600;

    text-align:left;

    padding:14px 16px;

    border-bottom:1px solid var(--border);

}

.table td{

    padding:14px 16px;

    border-bottom:1px solid var(--border);

    font-size:14px;

    color:var(--text);

}

.table tbody tr{

    transition:.2s;

}

.table tbody tr:hover{

    background:#F8FAFC;

}

/* ==========================================================
   BADGE
========================================================== */

.badge{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    padding:6px 12px;

    border-radius:999px;

    font-size:12px;

    font-weight:600;

}

.badge-success{

    background:#DCFCE7;

    color:#166534;

}

.badge-warning{

    background:#FEF3C7;

    color:#92400E;

}

.badge-danger{

    background:#FEE2E2;

    color:#991B1B;

}

.badge-info{

    background:#DBEAFE;

    color:#1D4ED8;

}

/* ==========================================================
   MODAL
========================================================== */

.modal-overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.modal{

    width:min(700px,95vw);

    background:#fff;

    border-radius:var(--radius);

    box-shadow:var(--shadow);

    overflow:hidden;

}

.modal-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 24px;

    border-bottom:1px solid var(--border);

}

.modal-title{

    font-size:18px;

    font-weight:700;

}

.modal-close{

    background:none;

    border:none;

    cursor:pointer;

    font-size:24px;

    color:var(--text-light);

}

.modal-body{

    padding:24px;

}

.modal-footer{

    display:flex;

    justify-content:flex-end;

    gap:10px;

    padding:18px 24px;

    border-top:1px solid var(--border);

}

/* ==========================================================
   LOADING
========================================================== */

.loading{

    position:fixed;

    inset:0;

    display:none;

    justify-content:center;

    align-items:center;

    background:rgba(255,255,255,.75);

    z-index:10000;

}

.spinner{

    width:54px;

    height:54px;

    border:5px solid #E5E7EB;

    border-top-color:var(--primary);

    border-radius:50%;

    animation:spin .8s linear infinite;

}

@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}

/* ==========================================================
   TOAST
========================================================== */

.toast{

    position:fixed;

    right:24px;

    bottom:24px;

    background:var(--dark);

    color:#fff;

    padding:14px 20px;

    border-radius:12px;

    box-shadow:var(--shadow);

    display:none;

    z-index:10001;

}

/* ==========================================================
   EMPTY STATE
========================================================== */

.empty{

    padding:60px 20px;

    text-align:center;

    color:var(--text-light);

}

.empty i{

    font-size:54px;

    margin-bottom:15px;

    color:var(--gray-300);

}

/* ==========================================================
   RESPONSIVE
========================================================== */

@media (max-width:992px){

    .sidebar{

        width:220px;

    }

    .content{

        padding:24px;

    }

}

@media (max-width:992px){

    .dashboard-content{

        grid-template-columns:1fr;

    }

}

@media (max-width:768px){

    .wrapper{

        flex-direction:column;

    }

    .sidebar{

        width:100%;

        min-height:auto;

        position:relative;

    }

    .menu{

        padding-bottom:20px;

    }

    .content{

        padding:18px;

    }

    .dashboard-grid{

        grid-template-columns:1fr;

    }

    .form-grid{

        grid-template-columns:1fr;

    }

    .page-header{

        flex-direction:column;

        align-items:flex-start;

        gap:16px;

    }

}
/* ==========================================================
   HEADER ACTIONS
========================================================== */

.header-actions{

    display:flex;

    gap:12px;

    align-items:center;

}

.dashboard{

    width:100%;

}
/* ==========================================================
   SUMMARY CARD ICON
========================================================== */

.stat-title{

    display:flex;

    align-items:center;

    gap:10px;

}

.stat-title i{

    font-size:18px;

    color:var(--primary);

}

.stat-card{

    position:relative;

    overflow:hidden;

}

.stat-card::after{

    content:"";

    position:absolute;

    width:120px;

    height:120px;

    right:-40px;

    top:-40px;

    border-radius:50%;

    background:rgba(37,99,235,.06);

}
/* ==========================================================
   DASHBOARD CONTENT
========================================================== */

.dashboard-content{

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:24px;

    margin-top:30px;

}

/* ==========================================================
   CARD HEADER
========================================================== */

.card-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;

}

.card-subtitle{

    margin-top:6px;

    font-size:13px;

    color:var(--text-light);

}

/* ==========================================================
   CHART
========================================================== */

.chart-card{

    min-height:420px;

}

.chart-container{

    position:relative;

    width:100%;

    height:320px;

}

.chart-container canvas{

    width:100% !important;

    height:100% !important;

}
/* ==========================================================
   UPCOMING JOBS
========================================================== */

.upcoming-list{

    display:flex;

    flex-direction:column;

    gap:16px;

}

.upcoming-item{

    display:flex;

    align-items:center;

    gap:16px;

    padding:14px;

    border:1px solid var(--border);

    border-radius:14px;

    transition:.25s;

    background:#fff;

}

.upcoming-item:hover{

    transform:translateY(-2px);

    box-shadow:var(--shadow);

}

.upcoming-date{

    width:62px;

    height:62px;

    border-radius:14px;

    background:var(--primary);

    color:#fff;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    flex-shrink:0;

}

.upcoming-date .day{

    font-size:22px;

    font-weight:700;

    line-height:1;

}

.upcoming-date .month{

    font-size:11px;

    letter-spacing:1px;

}

.upcoming-info{

    flex:1;

}

.job-title{

    font-size:15px;

    font-weight:600;

    color:var(--text);

}

.job-detail{

    margin-top:4px;

    font-size:13px;

    color:var(--text-light);

}
/* ==========================================================
   TABLE ENHANCEMENT
========================================================== */

.table tbody tr{

    transition:all .25s;

}

.table tbody tr:hover{

    background:#F8FAFC;

}

.table td{

    vertical-align:middle;

}

/* ==========================================================
   STATUS BADGE
========================================================== */

.badge{

    min-width:90px;

    text-align:center;

}

/* ==========================================================
   CARD SPACING
========================================================== */

.card + .card{

    margin-top:24px;

}
/* ==========================================================
   QUICK ACTIONS
========================================================== */

.quick-actions{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

    gap:18px;

}

.quick-action{

    background:#fff;

    border:1px solid var(--border);

    border-radius:16px;

    padding:24px;

    cursor:pointer;

    transition:.25s;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    gap:14px;

}

.quick-action:hover{

    transform:translateY(-4px);

    border-color:var(--primary);

    box-shadow:var(--shadow);

}

.quick-action i{

    font-size:34px;

    color:var(--primary);

}

.quick-action span{

    font-size:15px;

    font-weight:600;

    color:var(--text);

}
</style>
