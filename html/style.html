<style>

/* ==========================================================
   FOROAOMOE PHOTOGRAPHER CRM
   Version : 0.1
   Theme : Minimal
========================================================== */

/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

/* ==========================================================
   COLOR
========================================================== */

:root{

    --primary:#111827;
    --primary-light:#1F2937;

    --success:#22C55E;
    --warning:#F59E0B;
    --danger:#EF4444;
    --info:#3B82F6;

    --background:#F3F4F6;
    --card:#FFFFFF;

    --border:#E5E7EB;

    --text:#111827;
    --text-light:#6B7280;

    --sidebar:#FFFFFF;

    --radius:16px;

    --shadow:
        0 10px 25px rgba(0,0,0,.06);

}

/* ==========================================================
   RESET
========================================================== */

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

html{

    scroll-behavior:smooth;

}

body{

    font-family:'Inter',sans-serif;

    background:var(--background);

    color:var(--text);

    font-size:15px;

}

/* ==========================================================
   LINK
========================================================== */

a{

    text-decoration:none;

    color:inherit;

}

img{

    max-width:100%;

}

/* ==========================================================
   LAYOUT
========================================================== */

.wrapper{

    display:flex;

    min-height:100vh;

}

/* ==========================================================
   SIDEBAR
========================================================== */

.sidebar{

    width:260px;

    background:var(--sidebar);

    border-right:1px solid var(--border);

    position:fixed;

    left:0;

    top:0;

    bottom:0;

    overflow-y:auto;

    z-index:100;

}

/* ==========================================================
   LOGO
========================================================== */

.logo{

    padding:35px 25px;

    border-bottom:1px solid var(--border);

}

.logo h2{

    font-size:22px;

    font-weight:700;

    letter-spacing:2px;

}

.logo p{

    margin-top:6px;

    color:var(--text-light);

    font-size:13px;

}

/* ==========================================================
   MENU
========================================================== */

.menu{

    padding:20px;

}

.menu-title{

    font-size:11px;

    color:#999;

    text-transform:uppercase;

    margin-bottom:15px;

    letter-spacing:1px;

}

.menu ul{

    list-style:none;

}

.menu li{

    margin-bottom:8px;

}

.menu a{

    display:flex;

    align-items:center;

    gap:12px;

    padding:13px 15px;

    border-radius:12px;

    transition:.25s;

    font-weight:500;

}

.menu a:hover{

    background:var(--primary);

    color:#fff;

}

.menu a.active{

    background:var(--primary);

    color:#fff;

}

/* ==========================================================
   CONTENT
========================================================== */

.content{

    margin-left:260px;

    width:100%;

    padding:35px;

}

/* ==========================================================
   PAGE
========================================================== */

.page-title{

    font-size:30px;

    font-weight:700;

}

.page-subtitle{

    margin-top:6px;

    color:var(--text-light);

}

/* ==========================================================
   CARD
========================================================== */

.card{

    background:var(--card);

    border-radius:var(--radius);

    border:1px solid var(--border);

    box-shadow:var(--shadow);

    padding:24px;

    margin-top:25px;

}

.card-title{

    font-size:18px;

    font-weight:600;

    margin-bottom:18px;

}


/* ==========================================================
   DASHBOARD GRID
========================================================== */

.dashboard-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

    gap:20px;

    margin-top:25px;

}

.stat-card{

    background:#fff;

    border:1px solid var(--border);

    border-radius:var(--radius);

    padding:24px;

    box-shadow:var(--shadow);

    transition:.25s;

}

.stat-card:hover{

    transform:translateY(-3px);

}

.stat-title{

    font-size:14px;

    color:var(--text-light);

}

.stat-value{

    font-size:34px;

    font-weight:700;

    margin-top:12px;

}

.stat-footer{

    margin-top:15px;

    font-size:13px;

    color:var(--text-light);

}

/* ==========================================================
   BUTTON
========================================================== */

.btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:8px;

    border:none;

    cursor:pointer;

    border-radius:12px;

    padding:12px 20px;

    font-size:14px;

    font-weight:600;

    transition:.25s;

}

.btn:hover{

    opacity:.92;

}

.btn-primary{

    background:var(--primary);

    color:#fff;

}

.btn-success{

    background:var(--success);

    color:#fff;

}

.btn-danger{

    background:var(--danger);

    color:#fff;

}

.btn-warning{

    background:var(--warning);

    color:#fff;

}

.btn-light{

    background:#F3F4F6;

    color:var(--text);

    border:1px solid var(--border);

}

.btn-sm{

    padding:8px 14px;

    font-size:13px;

}

/* ==========================================================
   FORM
========================================================== */

.form-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

}

.form-group{

    margin-bottom:20px;

}

.form-group.full{

    grid-column:1 / -1;

}

label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

}

.form-control{

    width:100%;

    height:46px;

    border:1px solid var(--border);

    border-radius:12px;

    padding:0 14px;

    font-size:15px;

    background:#fff;

    transition:.2s;

}

.form-control:focus{

    outline:none;

    border-color:var(--info);

    box-shadow:0 0 0 3px rgba(59,130,246,.15);

}

textarea.form-control{

    height:120px;

    resize:vertical;

    padding:12px 14px;

}

select.form-control{

    cursor:pointer;

}

/* ==========================================================
   SEARCH
========================================================== */

.search-box{

    position:relative;

    margin-bottom:20px;

}

.search-box input{

    width:100%;

    height:48px;

    border:1px solid var(--border);

    border-radius:14px;

    padding-left:46px;

    padding-right:18px;

    font-size:15px;

}

.search-box svg{

    position:absolute;

    left:16px;

    top:50%;

    transform:translateY(-50%);

    width:18px;

    height:18px;

    color:#999;

}

/* ==========================================================
   TABLE
========================================================== */

.table-wrapper{

    overflow:auto;

}

.table{

    width:100%;

    border-collapse:collapse;

    min-width:900px;

}

.table thead{

    background:#F9FAFB;

}

.table th{

    text-align:left;

    padding:15px;

    font-size:13px;

    font-weight:700;

    border-bottom:1px solid var(--border);

}

.table td{

    padding:15px;

    border-bottom:1px solid var(--border);

}

.table tbody tr{

    transition:.2s;

}

.table tbody tr:hover{

    background:#F9FAFB;

}

/* ==========================================================
   BADGE
========================================================== */

.badge{

    display:inline-block;

    padding:6px 10px;

    border-radius:20px;

    font-size:12px;

    font-weight:600;

}

.badge-success{

    background:#DCFCE7;

    color:#166534;

}

.badge-warning{

    background:#FEF3C7;

    color:#92400E;

}

.badge-danger{

    background:#FEE2E2;

    color:#991B1B;

}

.badge-info{

    background:#DBEAFE;

    color:#1D4ED8;

}

/* ==========================================================
   ACTION BAR
========================================================== */

.action-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:15px;

    flex-wrap:wrap;

    margin-bottom:20px;

}

.action-group{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

}

/* ==========================================================
   MODAL
========================================================== */

.modal-overlay{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    align-items:center;
    justify-content:center;

    padding:20px;

    z-index:9999;

}

.modal{

    width:100%;
    max-width:700px;

    background:#fff;

    border-radius:20px;

    box-shadow:0 25px 50px rgba(0,0,0,.18);

    animation:modalIn .25s ease;

}

.modal-header{

    padding:20px 25px;

    border-bottom:1px solid var(--border);

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.modal-title{

    font-size:20px;

    font-weight:700;

}

.modal-close{

    border:none;

    background:none;

    font-size:26px;

    cursor:pointer;

}

.modal-body{

    padding:25px;

}

.modal-footer{

    padding:20px 25px;

    border-top:1px solid var(--border);

    display:flex;

    justify-content:flex-end;

    gap:10px;

}

/* ==========================================================
   LOADING
========================================================== */

.loading{

    position:fixed;

    inset:0;

    background:rgba(255,255,255,.8);

    display:none;

    align-items:center;

    justify-content:center;

    z-index:10000;

}

.spinner{

    width:48px;

    height:48px;

    border:5px solid #ddd;

    border-top:5px solid var(--primary);

    border-radius:50%;

    animation:spin .8s linear infinite;

}

/* ==========================================================
   EMPTY STATE
========================================================== */

.empty{

    text-align:center;

    padding:60px 20px;

    color:var(--text-light);

}

.empty h3{

    margin:15px 0;

}

.empty p{

    max-width:420px;

    margin:auto;

}

/* ==========================================================
   TOAST
========================================================== */

.toast{

    position:fixed;

    right:25px;

    bottom:25px;

    background:#111827;

    color:#fff;

    padding:15px 20px;

    border-radius:12px;

    display:none;

    box-shadow:var(--shadow);

    z-index:99999;

}

/* ==========================================================
   ANIMATION
========================================================== */

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

@keyframes modalIn{

    from{

        opacity:0;

        transform:translateY(20px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

@keyframes fadeIn{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}

/* ==========================================================
   SCROLLBAR
========================================================== */

::-webkit-scrollbar{

    width:8px;

    height:8px;

}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:10px;

}

::-webkit-scrollbar-track{

    background:transparent;

}

/* ==========================================================
   UTILITIES
========================================================== */

.mt-10{margin-top:10px;}
.mt-20{margin-top:20px;}
.mt-30{margin-top:30px;}

.mb-10{margin-bottom:10px;}
.mb-20{margin-bottom:20px;}
.mb-30{margin-bottom:30px;}

.text-center{text-align:center;}
.text-right{text-align:right;}

.d-flex{display:flex;}
.flex-between{

    display:flex;

    justify-content:space-between;

    align-items:center;

}

.w-100{

    width:100%;

}

.hidden{

    display:none !important;

}

/* ==========================================================
   RESPONSIVE
========================================================== */

@media(max-width:1200px){

    .dashboard-grid{

        grid-template-columns:repeat(2,1fr);

    }

}

@media(max-width:992px){

    .sidebar{

        position:relative;

        width:100%;

        height:auto;

    }

    .wrapper{

        flex-direction:column;

    }

    .content{

        margin-left:0;

        padding:20px;

    }

}

@media(max-width:768px){

    .dashboard-grid{

        grid-template-columns:1fr;

    }

    .form-grid{

        grid-template-columns:1fr;

    }

    .action-bar{

        flex-direction:column;

        align-items:stretch;

    }

    .page-title{

        font-size:24px;

    }

}

@media(max-width:576px){

    .card{

        padding:18px;

    }

    .modal{

        border-radius:14px;

    }

    .btn{

        width:100%;

    }

}

/* ==========================================================
   END
========================================================== */

</style>
