<script>

/* ==========================================================
   FOROAOMOE PHOTOGRAPHER CRM
   script.html

   Version : 1.0.0
   Commit 004
========================================================== */

/* ==========================================================
   GLOBAL STATE
========================================================== */

let dashboardData = {};

let bookingData = [];

let incomeChart = null;

let currentPage = "dashboard";

/* ==========================================================
   INITIALIZE
========================================================== */

window.addEventListener("load", initApp);

function initApp() {

    console.log("CRM Initialized");

    showLoading();

    bindEvents();

bindModalEvents();

loadDashboard();

}

/* ==========================================================
   BIND EVENTS
========================================================== */

function bindEvents(){

    // Sidebar
document
    .getElementById("btnNewBooking")
    ?.addEventListener(
        "click",
        openBookingModal
    );
    document
        .getElementById("menu-dashboard")
        ?.addEventListener(
            "click",
            function(e){

                e.preventDefault();

                showDashboard();

            }
        );

    document
        .getElementById("menu-booking")
        ?.addEventListener(
            "click",
            function(e){

                e.preventDefault();

                showBooking();

            }
        );

    // Dashboard

    document
        .getElementById("btnNewBooking")
        ?.addEventListener(
            "click",
            showBooking
        );

    document
    .getElementById("btnRefreshChart")
    ?.addEventListener(
        "click",
        refreshChart
    );

}

/* ==========================================================
   LOAD DASHBOARD
========================================================== */

function loadDashboard(){

    google.script.run

        .withSuccessHandler(function(res){

            dashboardData = res || {};

renderDashboard(dashboardData);

hideLoading();

        })

        .withFailureHandler(function(err){

            console.error(err);

            hideLoading();

        })

        .getDashboardSummary();

}
/* ==========================================================
   LOADING
========================================================== */

function showLoading(){

    const loading = document.getElementById("loading");

    if(!loading) return;

    loading.style.display = "flex";

}

function hideLoading(){

    const loading = document.getElementById("loading");

    if(!loading) return;

    loading.style.display = "none";

}

/* ==========================================================
   TOAST
========================================================== */

function showToast(message,type="success"){

    const toast = document.getElementById("toast");

    if(!toast) return;

    toast.textContent = message;

    toast.style.display = "block";

    switch(type){

        case "success":

            toast.style.background = "#22C55E";

            break;

        case "error":

            toast.style.background = "#EF4444";

            break;

        case "warning":

            toast.style.background = "#F59E0B";

            break;

        default:

            toast.style.background = "#111827";

    }

    setTimeout(function(){

        toast.style.display = "none";

    },3000);

}

/* ==========================================================
   ERROR HANDLER
========================================================== */

function handleError(error){

    console.error(error);

    hideLoading();

    showToast(

        "เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง",

        "error"

    );

}
/* ==========================================================
   NAVIGATION
========================================================== */

function showDashboard() {

    currentPage = "dashboard";

    // แสดง Dashboard
    document
        .getElementById("dashboardPage")
        ?.classList.remove("hidden");

    // ซ่อน Booking
    document
        .getElementById("bookingPage")
        ?.classList.add("hidden");

    // Active Menu
    setActiveMenu("menu-dashboard");

}

function showBooking() {

    currentPage = "booking";

    // ซ่อน Dashboard
    document
        .getElementById("dashboardPage")
        ?.classList.add("hidden");

    // แสดง Booking
    document
        .getElementById("bookingPage")
        ?.classList.remove("hidden");

    // Active Menu
    setActiveMenu("menu-booking");

}

/* ==========================================================
   ACTIVE MENU
========================================================== */

function setActiveMenu(menuId){

    document
        .querySelectorAll(".menu a")
        .forEach(function(item){

            item.classList.remove("active");

        });

    document
        .getElementById(menuId)
        ?.classList.add("active");

}

/* ==========================================================
   PAGE TITLE
========================================================== */

function getCurrentPage(){

    return currentPage;

}
/* ==========================================================
   DASHBOARD
========================================================== */

function renderDashboard(data){

    if(!data){

        return;

    }

    updateSummaryCards(data);

    loadIncomeChart(data.monthlyIncome || []);

    loadRecentBookings(data.recentBookings || []);

    loadUpcomingJobs(data.upcomingJobs || []);

}

/* ==========================================================
   SUMMARY
========================================================== */

function updateSummaryCards(data){

    document.getElementById("totalBookings").textContent =
        data.bookings ?? 0;

    document.getElementById("totalCustomers").textContent =
        data.customers ?? 0;

    document.getElementById("totalIncome").textContent =
        formatCurrency(data.income ?? 0);

    document.getElementById("pendingBookings").textContent =
        data.pending ?? 0;

}

/* ==========================================================
   RECENT BOOKINGS
========================================================== */

function loadRecentBookings(list){

    const tbody =
        document.getElementById("recentBookingTable");

    if(!tbody) return;

    if(!list.length){

        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center">
                    ไม่มีข้อมูล
                </td>
            </tr>
        `;

        return;

    }

    tbody.innerHTML = "";

    list.forEach(item=>{

        tbody.innerHTML += `
            <tr>

                <td>${item.customer}</td>

                <td>${item.package}</td>

                <td>${item.date}</td>

                <td>${formatCurrency(item.price)}</td>

                <td>
                    <span class="badge badge-success">
                        ${item.status}
                    </span>
                </td>

            </tr>
        `;

    });

}

/* ==========================================================
   UPCOMING JOBS
========================================================== */

function loadUpcomingJobs(list){

    const container =
        document.getElementById("upcomingList");

    if(!container) return;

    if(!list.length){

        container.innerHTML = `
            <div class="empty">

                ไม่มีงานที่กำลังจะมาถึง

            </div>
        `;

        return;

    }

    container.innerHTML = "";

    list.forEach(item=>{

        container.innerHTML += `

        <div class="upcoming-item">

            <div class="upcoming-date">

                <span class="day">

                    ${item.day}

                </span>

                <span class="month">

                    ${item.month}

                </span>

            </div>

            <div class="upcoming-info">

                <div class="job-title">

                    ${item.title}

                </div>

                <div class="job-detail">

                    ${item.location}

                </div>

            </div>

            <span class="badge badge-info">

                ${item.status}

            </span>

        </div>

        `;

    });

}
/* ==========================================================
   BOOKING
========================================================== */

function loadBookings() {

    showLoading();

    google.script.run

        .withSuccessHandler(function(result){

            bookingData = result || [];

            renderBookingTable();

            hideLoading();

        })

        .withFailureHandler(handleError)

        .getBookings();

}

/* ==========================================================
   RENDER BOOKING TABLE
========================================================== */

function renderBookingTable(){

    const tbody = document.getElementById("bookingTableBody");

    if(!tbody) return;

    if(bookingData.length === 0){

        tbody.innerHTML = `
            <tr>
                <td colspan="8" class="text-center">
                    ไม่มีข้อมูลการจอง
                </td>
            </tr>
        `;

        return;

    }

    tbody.innerHTML = bookingData.map(item => `

        <tr>

            <td>${item.bookingId}</td>

            <td>${item.customer}</td>

            <td>${item.package}</td>

            <td>${item.date}</td>

            <td>${formatCurrency(item.price)}</td>

            <td>

                <span class="badge badge-info">

                    ${item.status}

                </span>

            </td>

            <td>

                <button
                    class="btn btn-light"
                    onclick="editBooking('${item.bookingId}')">

                    <i class="bi bi-pencil"></i>

                </button>

            </td>

            <td>

                <button
                    class="btn btn-danger"
                    onclick="removeBooking('${item.bookingId}')">

                    <i class="bi bi-trash"></i>

                </button>

            </td>

        </tr>

    `).join("");

}

/* ==========================================================
   NEW BOOKING
========================================================== */

function newBooking(){

    showBooking();

    showToast("เปิดหน้าสร้าง Booking");

}

/* ==========================================================
   EDIT BOOKING
========================================================== */

function editBooking(id){

    console.log("Edit :",id);

    showToast("กำลังแก้ไข Booking");

}

/* ==========================================================
   DELETE BOOKING
========================================================== */

function removeBooking(id){

    Swal.fire({

        title:"ยืนยันการลบ",

        text:"ต้องการลบรายการนี้หรือไม่",

        icon:"warning",

        showCancelButton:true,

        confirmButtonText:"ลบ",

        cancelButtonText:"ยกเลิก"

    }).then(result=>{

        if(!result.isConfirmed){

            return;

        }

        showLoading();

        google.script.run

            .withSuccessHandler(function(){

                showToast("ลบข้อมูลสำเร็จ");

                loadBookings();

            })

            .withFailureHandler(handleError)

            .deleteBooking(id);

    });

}
/* ==========================================================
   CHART
========================================================== */

function loadIncomeChart(monthlyIncome = []) {

    const canvas = document.getElementById("incomeChart");

    if (!canvas) return;

    // ลบ Chart เดิม
    if (incomeChart) {
        incomeChart.destroy();
    }

    // ถ้ายังไม่มีข้อมูล ให้ใช้ข้อมูลตัวอย่าง
    if (!monthlyIncome.length) {

        monthlyIncome = [
            { month: "Jan", income: 12000 },
            { month: "Feb", income: 18000 },
            { month: "Mar", income: 15000 },
            { month: "Apr", income: 25000 },
            { month: "May", income: 32000 },
            { month: "Jun", income: 28000 },
            { month: "Jul", income: 35000 },
            { month: "Aug", income: 30000 },
            { month: "Sep", income: 22000 },
            { month: "Oct", income: 27000 },
            { month: "Nov", income: 40000 },
            { month: "Dec", income: 52000 }
        ];

    }

    incomeChart = new Chart(canvas, {

        type: "bar",

        data: {

            labels: monthlyIncome.map(item => item.month),

            datasets: [

                {

                    label: "Income",

                    data: monthlyIncome.map(item => item.income),

                    borderWidth: 0,

                    borderRadius: 8,

                    backgroundColor: "#2563EB",

                    hoverBackgroundColor: "#1D4ED8"

                }

            ]

        },

        options: {

            responsive: true,

            maintainAspectRatio: false,

            plugins: {

                legend: {

                    display: false

                }

            },

            scales: {

                y: {

                    beginAtZero: true,

                    ticks: {

                        callback(value) {

                            return "฿" + value.toLocaleString();

                        }

                    }

                }

            }

        }

    });

}

/* ==========================================================
   REFRESH CHART
========================================================== */

function refreshChart(){

    loadIncomeChart(
        dashboardData.monthlyIncome || []
    );

}
/* ==========================================================
   MODAL
========================================================== */

function openModal(title, content = "") {

    const overlay = document.getElementById("modalOverlay");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");

    if (!overlay || !modalTitle || !modalBody) return;

    modalTitle.textContent = title;

    modalBody.innerHTML = content;

    overlay.style.display = "flex";

}

function closeModal() {

    const overlay = document.getElementById("modalOverlay");

    if (!overlay) return;

    overlay.style.display = "none";

}

/* ==========================================================
   MODAL EVENTS
========================================================== */

function bindModalEvents() {

    document
        .getElementById("modalClose")
        ?.addEventListener(
            "click",
            closeModal
        );

    document
        .getElementById("modalCancel")
        ?.addEventListener(
            "click",
            closeModal
        );

    document
        .getElementById("modalOverlay")
        ?.addEventListener(
            "click",
            function (e) {

                if (e.target.id === "modalOverlay") {

                    closeModal();

                }

            }
        );

}

/* ==========================================================
   BOOKING MODAL
========================================================== */

function openBookingModal() {

    openModal(

        "New Booking",

        `
        <div class="text-center">

            <i class="bi bi-calendar-plus"
               style="font-size:48px;color:#2563EB;"></i>

            <h3 class="mt-20">

                Booking Form

            </h3>

            <p class="mt-10">

                ส่วนของแบบฟอร์ม Booking
                จะถูกสร้างใน Commit 005

            </p>

        </div>
        `

    );

}
/* ==========================================================
   HELPER
========================================================== */

/**
 * Format Currency
 */
function formatCurrency(value){

    const number = Number(value) || 0;

    return "฿" + number.toLocaleString("th-TH",{

        minimumFractionDigits:0,

        maximumFractionDigits:0

    });

}

/**
 * Format Date
 */
function formatDate(date){

    if(!date) return "-";

    const d = new Date(date);

    return d.toLocaleDateString("th-TH",{

        day:"2-digit",

        month:"short",

        year:"numeric"

    });

}

/**
 * Escape HTML
 */
function escapeHtml(text){

    if(text == null) return "";

    return String(text)

        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");

}

/**
 * Reset Form
 */
function resetForm(formId){

    const form = document.getElementById(formId);

    if(form){

        form.reset();

    }

}

/**
 * Debounce
 */
function debounce(callback,delay=300){

    let timer;

    return function(){

        clearTimeout(timer);

        const args = arguments;

        timer = setTimeout(()=>{

            callback.apply(this,args);

        },delay);

    };

}

/**
 * Sleep
 */
function sleep(ms){

    return new Promise(resolve=>{

        setTimeout(resolve,ms);

    });

}

 * Console Banner
 */
console.log(
    "%cFOROAOMOE Photographer CRM",
    "color:#2563EB;font-size:16px;font-weight:bold;"
);

console.log(
    "%cVersion 1.0.0",
    "color:#6B7280;"
);

</script>
